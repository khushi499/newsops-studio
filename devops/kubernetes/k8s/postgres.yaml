apiVersion: v1
kind: Secret
metadata:
  name: newsops-secret
  namespace: newsops
type: Opaque
stringData:
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/newsops?schema=public
  JWT_SECRET: super-secret-newsops-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: newsops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: newsops
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: newsops
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
