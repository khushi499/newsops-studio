apiVersion: apps/v1
kind: Deployment
metadata:
  name: newsops-backend
  namespace: newsops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newsops-backend
  template:
    metadata:
      labels:
        app: newsops-backend
    spec:
      containers:
        - name: backend
          image: yourdockerhubusername/newsops-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsops-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newsops-secret
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: http://localhost:3000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: newsops
spec:
  selector:
    app: newsops-backend
  ports:
    - port: 5000
      targetPort: 5000
