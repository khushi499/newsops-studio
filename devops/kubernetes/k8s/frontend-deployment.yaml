apiVersion: apps/v1
kind: Deployment
metadata:
  name: newsops-frontend
  namespace: newsops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newsops-frontend
  template:
    metadata:
      labels:
        app: newsops-frontend
    spec:
      containers:
        - name: frontend
          image: yourdockerhubusername/newsops-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: newsops
spec:
  type: NodePort
  selector:
    app: newsops-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
